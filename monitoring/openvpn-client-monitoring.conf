client
dev tun
proto tcp
remote vpn.example.com 1195
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
auth SHA256
cipher AES-256-CBC
ncp-ciphers AES-256-GCM:AES-128-GCM:AES-256-CBC
verb 3
<ca>
<CA_CERT>
</ca>
<cert>
<CLIENT_CERT>
</cert>
<key>
<CLIENT_KEY>
</key>
<tls-crypt>
<TLS_CRYPT_KEY>
</tls-crypt>
